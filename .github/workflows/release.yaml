name: build and release

on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform.os_name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # ── Musl (static) builds via Docker ──
          #- os_name: Linux-x86_64-musl
          #  os: ubuntu-24.04
          #  target: x86_64-unknown-linux-musl
          #  bin: ${{ github.event.repository.name }}-amd64-linux-musl
          #  docker: true
          #  docker_platform: linux/amd64
          #- os_name: Linux-aarch64-musl
          #  os: ubuntu-24.04-arm
          #  target: aarch64-unknown-linux-musl
          #  bin: ${{ github.event.repository.name }}-arm64-linux-musl
          #  docker: true
          #  docker_platform: linux/arm64
          # ── GNU builds via cross ──
          - os_name: Linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bin: ${{ github.event.repository.name }}-amd64-linux
          # ── macOS ──
          #- os_name: macOS-x86_64
          # os: macOS-13
          #  target: x86_64-apple-darwin
          #  bin: ${{ github.event.repository.name }}-amd64-darwin
          - os_name: macOS-aarch64
            os: macOS-latest
            target: aarch64-apple-darwin
            bin: ${{ github.event.repository.name }}-arm64-darwin
          # ── Windows ──
          - os_name: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: ${{ github.event.repository.name }}-amd64-windows.exe
    steps:
      - uses: actions/checkout@v4

      # ── Docker-based musl builds (GCC 12+ for C++20) ──
      - name: Setup Docker Buildx
        if: matrix.platform.docker
        uses: docker/setup-buildx-action@v3

      - name: Build musl binary with Docker
        if: matrix.platform.docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./musl.Dockerfile
          push: false
          platforms: ${{ matrix.platform.docker_platform }}
          tags: ${{ github.event.repository.name }}:musl
          load: true
          cache-from: type=gha,scope=musl-${{ matrix.platform.target }}
          cache-to: type=gha,scope=musl-${{ matrix.platform.target }},mode=max

      - name: Extract musl binary from image
        if: matrix.platform.docker
        run: |
          mkdir -p target/${{ matrix.platform.target }}/release
          container_id=$(docker create ${{ github.event.repository.name }}:musl)
          docker cp $container_id:/app/smol-kv target/${{ matrix.platform.target }}/release/${{ github.event.repository.name }}
          docker rm $container_id

      # ── Native builds via cross ──
      - name: Build binary
        if: ${{ !matrix.platform.docker }}
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: "build"
          target: ${{ matrix.platform.target }}
          args: "--release"
          strip: true

      # ── Package ──
      - name: Rename binary (unix)
        if: matrix.platform.os_name != 'Windows-x86_64'
        run: mv target/${{ matrix.platform.target }}/release/${{ github.event.repository.name }} target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }}

      - name: Rename binary (windows)
        if: matrix.platform.os_name == 'Windows-x86_64'
        run: mv target/${{ matrix.platform.target }}/release/${{ github.event.repository.name }}.exe target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }}

      - name: Generate SHA-256
        run: shasum -a 256 target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }} | cut -d ' ' -f 1 > target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }}.sha256

      - name: Release binary and SHA-256 checksum to GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }}
            target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }}.sha256
