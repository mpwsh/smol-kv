          <!-- ═══ BACKUPS VIEW ═══ -->
          <div
            x-show="$store.app.currentView === 'backups' && $store.collections.activeCollection"
            x-transition.opacity
          >
            <div class="mb-4">
              <h2 class="text-[16px] font-600 text-primary mb-1">Backups</h2>
              <p class="text-[12px] text-tertiary">
                Create and restore backups for
                <span
                  class="text-accent"
                  x-text="$store.collections.activeCollection"
                ></span>
              </p>
            </div>
            <div class="card mb-4">
              <div class="flex items-center gap-2 flex-wrap">
                <button
                  @click="$store.backups.start()"
                  :disabled="$store.backups.backupInProgress"
                  class="btn-primary text-[12px] !py-2"
                >
                  <svg
                    class="w-3.5 h-3.5 mr-1.5"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"
                    />
                  </svg>
                  <span
                    x-show="$store.backups.backupInProgress"
                    class="pulse-soft"
                    >Creating…</span
                  >
                  <span x-show="!$store.backups.backupInProgress"
                    >Create backup</span
                  >
                </button>
                <button
                  @click="$store.backups.showUpload = !$store.backups.showUpload"
                  class="btn-secondary text-[12px] !py-2"
                >
                  Upload backup
                </button>
                <button
                  @click="$store.backups.load()"
                  class="btn-secondary text-[12px] !py-2"
                  :disabled="$store.backups.loading"
                >
                  Refresh
                </button>
              </div>
              <div
                x-show="$store.backups.showUpload"
                x-transition
                class="mt-4 pt-4 border-t border-rule"
              >
                <label class="field-label">Upload SST backup file</label>
                <input
                  type="file"
                  @change="$store.backups.upload($event)"
                  class="w-full text-[12px] text-tertiary file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-[12px] file:bg-surface file:text-secondary file:cursor-pointer hover:file:bg-hover"
                />
              </div>
            </div>
            <div class="card">
              <div class="card-header">
                <h3 class="card-title">Available backups</h3>
                <span
                  class="card-meta"
                  x-text="$store.backups.list.length + ' backups'"
                ></span>
              </div>
              <div x-show="$store.backups.loading" class="text-center py-8">
                <span class="font-mono text-[12px] text-tertiary pulse-soft"
                  >Loading…</span
                >
              </div>
              <template
                x-if="!$store.backups.loading && $store.backups.list.length === 0"
                ><div class="text-center py-8">
                  <p class="font-mono text-[12px] text-quaternary">
                    No backups yet
                  </p>
                </div></template
              >
              <div
                x-show="!$store.backups.loading && $store.backups.list.length > 0"
                class="space-y-1"
              >
                <template
                  x-for="(backup, i) in $store.backups.list"
                  :key="backup.id || i"
                >
                  <div
                    class="flex items-center gap-3 py-2.5 px-3 rounded-md hover:bg-hover/50 transition-colors group"
                  >
                    <svg
                      class="w-4 h-4 text-quaternary shrink-0"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                      stroke-width="1.5"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5m8.25 3v6.75m0 0l-3-3m3 3l3-3M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"
                      />
                    </svg>
                    <div class="flex-1 min-w-0">
                      <div
                        class="font-mono text-[12px] text-primary truncate"
                        x-text="backup.id"
                      ></div>
                      <div
                        class="font-mono text-[10px] text-quaternary"
                        x-text="backup.started_at ? new Date(backup.started_at).toLocaleString() : ''"
                      ></div>
                    </div>
                    <span
                      class="font-mono text-[10px] px-1.5 py-0.5 rounded"
                      :class="{'bg-success/10 text-success': backup.status === 'completed', 'bg-danger/10 text-danger': backup.status === 'failed', 'bg-accent/10 text-accent': backup.status === 'in_progress'}"
                      x-text="backup.status"
                    ></span>
                    <div
                      class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity shrink-0"
                    >
                      <template
                        x-if="backup.status === 'completed' && backup.url"
                      >
                        <a
                          :href="$store.backups.downloadUrl(backup)"
                          download
                          class="p-1 text-quaternary hover:text-accent transition-colors rounded"
                          title="Download .sst"
                        >
                          <svg
                            class="w-3.5 h-3.5"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                            stroke-width="2"
                          >
                            <path
                              stroke-linecap="round"
                              stroke-linejoin="round"
                              d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"
                            />
                          </svg>
                        </a>
                      </template>
                      <template x-if="backup.status === 'completed'">
                        <button
                          @click="$store.backups.startRestore(backup.id)"
                          :disabled="$store.backups.restoreInProgress"
                          class="p-1 text-quaternary hover:text-success transition-colors rounded"
                          title="Restore this backup"
                        >
                          <svg
                            class="w-3.5 h-3.5"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                            stroke-width="2"
                          >
                            <path
                              stroke-linecap="round"
                              stroke-linejoin="round"
                              d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3"
                            />
                          </svg>
                        </button>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>
