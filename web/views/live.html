          <!-- ═══ LIVE VIEW ═══ -->
          <div
            x-show="$store.app.currentView === 'live' && $store.collections.activeCollection"
            x-transition.opacity
          >
            <div class="mb-4">
              <h2 class="text-[16px] font-600 text-primary mb-1">
                Live Events
              </h2>
              <p class="text-[12px] text-tertiary">
                Subscribe to real-time changes on
                <span
                  class="text-accent"
                  x-text="$store.collections.activeCollection"
                ></span>
              </p>
            </div>
            <div class="card mb-4">
              <div class="flex items-center gap-2">
                <template x-if="!$store.live.connected"
                  ><button
                    @click="$store.live.connect()"
                    class="btn-primary text-[12px] !py-2"
                  >
                    <svg
                      class="w-3.5 h-3.5 mr-1.5"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"
                      /></svg
                    >Subscribe
                  </button></template
                >
                <template x-if="$store.live.connected"
                  ><button
                    @click="$store.live.disconnect()"
                    class="btn-secondary text-[12px] !py-2 btn-danger"
                  >
                    Disconnect
                  </button></template
                >
                <template x-if="$store.live.connected"
                  ><button
                    @click="$store.live.togglePause()"
                    class="btn-secondary text-[12px] !py-2"
                    x-text="$store.live.paused ? 'Resume' : 'Pause'"
                  ></button
                ></template>
                <button
                  @click="$store.live.clear()"
                  :disabled="$store.live.events.length === 0"
                  class="btn-secondary text-[12px] !py-2"
                >
                  Clear
                </button>
                <span class="flex-1"></span>
                <span
                  class="status-dot"
                  :class="$store.live.connected ? 'connected' : 'disconnected'"
                ></span>
                <span
                  class="font-mono text-[10px]"
                  :class="$store.live.connected ? 'text-success' : 'text-quaternary'"
                  x-text="$store.live.connected ? ($store.live.paused ? 'Paused' : 'Connected') : 'Disconnected'"
                ></span>
                <span
                  class="font-mono text-[10px] text-quaternary"
                  x-text="'· ' + $store.live.events.length + ' events'"
                ></span>
              </div>
            </div>
            <div class="border border-rule rounded-lg overflow-hidden">
              <template x-if="$store.live.events.length === 0"
                ><div class="text-center py-12">
                  <p class="font-mono text-[12px] text-quaternary">
                    <template x-if="$store.live.connected"
                      ><span>Waiting for events…</span></template
                    ><template x-if="!$store.live.connected"
                      ><span>Subscribe to see live events</span></template
                    >
                  </p>
                </div></template
              >
              <div class="max-h-[60vh] overflow-y-auto scroll-thin">
                <template
                  x-for="(event, i) in $store.live.events"
                  :key="i"
                >
                  <div
                    class="px-4 py-2.5 border-b border-rule/30 last:border-0 fade-in"
                    :class="{'bg-success/3': event.data.operation === 'Create', 'bg-danger/3': event.data.operation === 'Delete'}"
                  >
                    <div class="flex items-center gap-2 mb-1">
                      <span
                        class="font-mono text-[10px] px-1.5 py-0.5 rounded"
                        :class="{'bg-success/10 text-success': event.data.operation === 'Create', 'bg-danger/10 text-danger': event.data.operation === 'Delete', 'bg-accent/10 text-accent': event.data.type === 'connected'}"
                        x-text="event.data.operation || event.data.type || '?'"
                      ></span>
                      <template x-if="event.data.key"
                        ><span
                          class="font-mono text-[12px] text-primary"
                          x-text="event.data.key"
                        ></span
                      ></template>
                      <span class="flex-1"></span>
                      <span
                        class="font-mono text-[10px] text-quaternary"
                        x-text="new Date(event.ts).toLocaleTimeString()"
                      ></span>
                    </div>
                    <template
                      x-if="event.data.value && event.data.value !== null"
                      ><div
                        class="json-view text-[11px] mt-1 max-h-24 overflow-hidden"
                        x-html="$store.app.syntaxHighlight(event.data.value)"
                      ></div
                    ></template>
                  </div>
                </template>
              </div>
            </div>
          </div>
