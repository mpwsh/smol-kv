          <!-- ═══ SETTINGS VIEW ═══ -->
          <div
            x-show="$store.app.currentView === 'settings' && $store.collections.activeCollection"
            x-transition.opacity
          >
            <div class="mb-4">
              <h2 class="text-[16px] font-600 text-primary mb-1">Settings</h2>
              <p class="text-[12px] text-tertiary">
                Manage
                <span
                  class="text-accent"
                  x-text="$store.collections.activeCollection"
                ></span>
              </p>
            </div>
            <div class="card mb-4">
              <div class="card-header">
                <h3 class="card-title">Storage</h3>
                <button
                  @click="$store.collections.loadSize()"
                  class="text-[11px] text-tertiary hover:text-primary transition-colors"
                >
                  Refresh
                </button>
              </div>
              <template x-if="$store.collections.collectionSize">
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                  <div>
                    <div
                      class="font-mono text-[10px] text-quaternary mb-1 uppercase tracking-wider"
                    >
                      Total
                    </div>
                    <div
                      class="font-mono text-[16px] text-primary"
                      x-text="$store.collections.collectionSize.total_mb?.toFixed(3) + ' MB'"
                    ></div>
                  </div>
                  <div>
                    <div
                      class="font-mono text-[10px] text-quaternary mb-1 uppercase tracking-wider"
                    >
                      SST
                    </div>
                    <div
                      class="font-mono text-[14px] text-secondary"
                      x-text="$store.app.formatBytes($store.collections.collectionSize.sst_bytes || 0)"
                    ></div>
                  </div>
                  <div>
                    <div
                      class="font-mono text-[10px] text-quaternary mb-1 uppercase tracking-wider"
                    >
                      Memtable
                    </div>
                    <div
                      class="font-mono text-[14px] text-secondary"
                      x-text="$store.app.formatBytes($store.collections.collectionSize.mem_table_bytes || 0)"
                    ></div>
                  </div>
                  <div>
                    <div
                      class="font-mono text-[10px] text-quaternary mb-1 uppercase tracking-wider"
                    >
                      Blobs
                    </div>
                    <div
                      class="font-mono text-[14px] text-secondary"
                      x-text="$store.app.formatBytes($store.collections.collectionSize.blob_bytes || 0)"
                    ></div>
                  </div>
                </div>
              </template>
              <template x-if="!$store.collections.collectionSize"
                ><p class="font-mono text-[12px] text-quaternary">
                  Loading…
                </p></template
              >
            </div>
            <div class="card border-danger/20">
              <div class="card-header">
                <h3 class="card-title text-danger">Danger zone</h3>
              </div>
              <div class="space-y-3">
                <div class="flex items-center justify-between">
                  <div>
                    <div class="text-[13px] text-primary">
                      Compact collection
                    </div>
                    <div class="text-[11px] text-tertiary">
                      Trigger SST compaction and TTL cleanup
                    </div>
                  </div>
                  <button
                    @click="$store.collections.compact()"
                    class="btn-secondary btn-sm text-[11px]"
                  >
                    Compact
                  </button>
                </div>
                <div class="h-px bg-rule"></div>
                <div class="flex items-center justify-between">
                  <div>
                    <div class="text-[13px] text-primary">Drop collection</div>
                    <div class="text-[11px] text-tertiary">
                      Permanently delete this collection and all its data
                    </div>
                  </div>
                  <button
                    @click="$store.collections.drop($store.collections.activeCollection)"
                    class="btn-secondary btn-sm btn-danger text-[11px]"
                  >
                    Drop
                  </button>
                </div>
              </div>
            </div>
          </div>
